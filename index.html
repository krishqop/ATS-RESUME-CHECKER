<!DOCTYPE html>
<html>
<head>
<title>Free ATS Resume Score Checker</title>
<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:500px;
margin:auto;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h2>Free ATS Resume Score Checker</h2>

<input type="file" id="resume">

<br><br>

<textarea id="jobdesc" placeholder="Paste Job Description Here" rows="6" cols="40"></textarea>

<br><br>

<button onclick="checkATS()">Check ATS Score</button>

<div id="result"></div>

</div>

<script>

function checkATS(){

let file=document.getElementById("resume").files[0]

let jd=document.getElementById("jobdesc").value.toLowerCase()

if(!file || jd==""){
alert("Upload resume and job description")
return
}

let reader=new FileReader()

reader.onload=function(e){

let text=e.target.result.toLowerCase()

let jdWords=jd.split(/\W+/)

let match=0

jdWords.forEach(word=>{
if(text.includes(word)){
match++
}
})

let score=Math.round((match/jdWords.length)*100)

document.getElementById("result").innerHTML=

"<h3>ATS Score: "+score+"%</h3>"

}

reader.readAsText(file)

}

</script>

</body>

</html
